# ════════════════════════════════════════
#  Verdana Backend – Application Config
#  Author: Anurag Kumar
# ════════════════════════════════════════

server.port=8080

spring.application.name=verdana-backend

# ── Database (MySQL) ──────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/verdana_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=verdana_user
spring.datasource.password=verdana_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Email (Gmail SMTP) ────────────────
# Replace with real credentials before deploying.
# Recommended: Use App Password (not your main password).
# https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=luckyanurag9045@gmail.com
spring.mail.password=YOUR_APP_PASSWORD_HERE
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Verdana Custom Props ──────────────
verdana.mail.to=luckyanurag9045@gmail.com
verdana.mail.from=noreply@verdana.eco

# ── Logging ───────────────────────────
logging.level.com.verdana=INFO
logging.level.org.springframework.mail=WARN
logging.pattern.console=%clr(%d{HH:mm:ss}){faint} %clr(%-5level) %clr(%-30.30logger{30}){cyan} : %msg%n

# ── Jackson ───────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata
