server.port=8080

spring.application.name=verdana-backend

# ── Database (MySQL) ──────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/verdana_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=verdana_user 
spring.datasource.password=verdana_pass 
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

